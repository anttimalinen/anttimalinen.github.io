# The Site Configuration

# Import the theme
theme: jekyll-theme-chirpy

# The language of the webpage › http://www.lingoes.net/en/translator/langcode.htm
lang: en

# Change to your timezone › https://zones.arilyn.cc
timezone: Europe/Helsinki

# jekyll-seo-tag settings › https://github.com/jekyll/jekyll-seo-tag/blob/master/docs/usage.md
# ↓ --------------------------

# Browser tab title and the big name in the sidebar.
# Keep the quotes around your text: this file is YAML, where bare
# curly braces have special meaning.
title: "Antti Malinen"

# One line under the title, the first thing a recruiter reads.
# State what you are and what you offer, not that you're a learner.
tagline: "ICT Engineering student building toward security work"

description: >- # used by seo meta and the atom feed
   "ICT Engineering student building hands-on proof of cybersecurity skills.
    TryHackMe writeups and foundational security concepts, mapped to real
    tools: Microsoft Sentinel, Entra, and M365."

# Fill in the protocol & hostname for your site.
# Must match your repo name exactly. Note: no '/' at the end.
url: "https://anttimalinen.github.io"

github:
  username: "anttimalinen"

# Not using Twitter/X: leaving this empty is fine.
twitter:
  username:

social:
  # Your real name, exactly as on your CV.
  # Displayed as the default author of posts and the copyright owner in the footer.
  name: ""
  email: ""
  fediverse_handle:
  links:
    # The first element serves as the copyright owner's link.
    - ""
    # Uncomment when you want LinkedIn visible to employers:
    # - "https://www.linkedin.com/in/{your LinkedIn handle}"

# Site Verification Settings: all optional, leave empty for launch.
webmaster_verifications:
  google:
  bing:
  alexa:
  yandex:
  baidu:
  facebook:

# ↑ --------------------------
# The end of `jekyll-seo-tag` settings

# Web Analytics Settings: all optional, leave empty for launch.
analytics:
  google:
    id:
  goatcounter:
    id:
  umami:
    id:
    domain:
  matomo:
    id:
    domain:
  cloudflare:
    id:
  fathom:
    id:

# Page views settings
pageviews:
  provider:

# Prefer color scheme setting.
# Keeping this empty follows each visitor's own system setting and
# shows a light/dark toggle in the sidebar. Best default, leave it.
theme_mode: # [light | dark]

# The CDN endpoint for media resources. Not needed on GitHub Pages.
cdn:

# The avatar on sidebar, support local or CORS resources.
# Upload a square image (e.g. 400x400 monogram) to assets/img/ first,
# then set: /assets/img/avatar.png
avatar: ""

# The URL of the site-wide social preview image used in SEO `og:image` meta tag.
social_preview_image:

# boolean type, the global switch for TOC in posts.
toc: true

actions:
  edit_post:
    enabled: false
    url: ""
    static_url: false

comments:
  # Global switch for the post-comment system. Keeping it empty means disabled.
  # Fine to leave disabled; a portfolio blog doesn't need comments.
  provider: # [disqus | utterances | giscus]
  disqus:
    shortname:
  utterances:
    repo:
    issue_term:
  giscus:
    repo:
    repo_id:
    category:
    category_id:
    mapping:
    strict:
    input_position:
    lang:
    reactions_enabled:

# Self-hosted static assets, optional
assets:
  self_host:
    enabled:
    env:

pwa:
  enabled: true # The option for PWA feature (installable)
  cache:
    enabled: true # The option for PWA offline cache
    deny_paths:

paginate: 10

# The base URL of your site
baseurl: ""

# ------------ The following options are not recommended to be modified ------------------

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts: # Rouge Options › https://github.com/jneen/rouge#full-options
    css_class: highlight
    # default_lang: console
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: "" # An empty string here means all files in the project
      type: posts
    values:
      layout: post
      comments: true # Enable comments in posts.
      toc: true # Display TOC column in posts.
      # DO NOT modify the following parameter unless you are confident enough
      # to update the code of all other post links in this project.
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs # see `site.collections`
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/